name: Build Galileo Loader (Windows)

on:
  push:
    tags:
      - 'galileo-loader-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: 'Galileo Loader'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Extract version from ref
        id: ver
        shell: bash
        run: |
          # Tag push: galileo-loader-v0.3.0 -> v0.3.0
          # Manual dispatch from a branch: main -> main
          VER="${GITHUB_REF_NAME#galileo-loader-}"
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "exe=GalileoLoader-${VER}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ steps.ver.outputs.exe }}.exe
        run: pyinstaller --onefile --name "${{ steps.ver.outputs.exe }}" --add-data "tk_logo.png;." galileo_loader.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.exe }}-windows
          path: 'Galileo Loader/dist/${{ steps.ver.outputs.exe }}.exe'
          retention-days: 90

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: 'Galileo Loader/dist/${{ steps.ver.outputs.exe }}.exe'
          generate_release_notes: true
